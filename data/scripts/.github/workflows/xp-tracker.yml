name: XP Tracker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-xp:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Rodar script
        run: python scripts/xp_calculator.py

      - name: Salvar progresso
        run: |
          git config user.name "xp-bot"
          git config user.email "xp@bot.com"
          git add data/xp.json
          git commit -m "Atualização diária de XP"
          git push
